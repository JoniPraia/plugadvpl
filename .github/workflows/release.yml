name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # apenas tags semver finais (v0.1.0, v1.2.3)
      # pre-release tags (v0.1.0-rc1, v0.1.0-rc2) NÃO disparam release.yml —
      # elas são tratadas por release-rc.yml (TestPyPI)

permissions:
  contents: write
  id-token: write   # OIDC for Trusted Publisher

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Build wheel
        run: cd cli && uv build
      - name: Upload wheel + sdist as artifact (for github-release job)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: cli/dist/*
          if-no-files-found: error
      - name: Publish to PyPI (Trusted Publisher OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/

  github-release:
    runs-on: ubuntu-latest
    needs: publish-pypi
    steps:
      - uses: actions/checkout@v4
      - name: Download dist artifact from publish-pypi
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
