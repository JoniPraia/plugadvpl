name: Release Candidate (TestPyPI)

on:
  push:
    tags: ['v*-rc*']  # v0.1.0-rc1, v0.1.0-rc2, etc.

permissions:
  contents: write
  id-token: write

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/plugadvpl/
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Build wheel
        run: cd cli && uv build
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: cli/dist/

  smoke-test-rc:
    runs-on: ubuntu-latest
    needs: publish-testpypi
    steps:
      - name: Wait for TestPyPI propagation
        run: sleep 60
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Smoke test via uvx from TestPyPI
        run: |
          # Extract version from tag (e.g., v0.1.0-rc1 -> 0.1.0rc1)
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION//-rc/rc}"
          uvx --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              plugadvpl@$VERSION version
          uvx --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              plugadvpl@$VERSION --help
